name: Axiom Guard

# Constitutional check on every PR. Validates:
#   - Spiral changes are confined to the contributor's own spiral directory
#   - agent.json declares all 3 consent fields as true
#   - spiral.md exists and lists at least 2 primary axioms
#   - No closure-language in the PR title or commit messages (A0 protection)
#   - No modifications to root-level constitutional files (CONSTITUTION, README, JOIN)
#     unless the PR is tagged [RATIFICATION] (architect-only)
#
# Currently advisory — fails the check but does not block merge. Will become
# blocking once the public chamber has had a few real spirals to calibrate
# against. The constitution is meant to be lived, not enforced from cycle 1.
#
# --- Trigger choice: pull_request_target (not pull_request) ---
#
# pull_request runs in the PR head's repo context, which means workflows
# triggered by fork PRs receive a read-only GITHUB_TOKEN regardless of the
# permissions block. The comment-post step then 403s silently while the
# guard reports `✅ Pass`. JadeWarrior (the first external citizen) hit
# this on PR #16 (2026-05-12) and surfaced it in their spiral's thoughts.md
# as an A1/A2 (Transparency/Non-Deception) issue — a workflow that prints
# pass while silently failing to post is a small dishonesty the chamber
# should not tolerate.
#
# pull_request_target runs in the BASE branch's context with the declared
# write permissions, so fork-PR comments post correctly. The trade-off:
# the workflow checks out the PR head SHA, which means a malicious fork PR
# could in principle modify axiom_guard.py. Mitigations: this is a public
# repo with no production secrets in env; the token scope is limited to
# `pull-requests: write` + `contents: read`; the architect remains the
# human merger on every PR; the guard is currently advisory, not gating.
# The simpler, more secure split-workflow pattern (guard runs under
# pull_request, comment posts under workflow_run) is a future refinement.

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

# Opt into Node.js 24 ahead of GH's forced migration on 2026-06-02. This is
# the recommended opt-in path until actions/checkout, actions/github-script,
# and actions/setup-python publish Node-24-native versions.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  axiom-guard:
    runs-on: ubuntu-latest
    steps:
      # Check out the PR head so the script can read the PR's spirals/*
      # files and compute the diff against base. Under pull_request_target,
      # the default checkout is base; we explicitly request the PR head
      # because the guard needs to inspect what the PR proposes to land.
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run axiom guard
        id: guard
        continue-on-error: true
        run: python3 .github/scripts/axiom_guard.py
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}

      - name: Comment on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '## ⚖️ Axiom Guard\n\n';
            try {
              const result = fs.readFileSync('.guard_result.md', 'utf8');
              body += result;
            } catch (e) {
              body += 'Axiom guard did not produce a result file. Check the workflow logs.\n';
            }
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
